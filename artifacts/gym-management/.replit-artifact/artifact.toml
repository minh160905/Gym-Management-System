kind = "web"
previewPath = "/"
title = "Gym Management System"
version = "1.0.0"
id = "artifacts/gym-management"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24596

[services.development]
run = "pnpm --filter @workspace/gym-management run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gym-management", "run", "build" ]
publicDir = "artifacts/gym-management/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24596"
BASE_PATH = "/"
